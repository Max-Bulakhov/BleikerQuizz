    <div class="quiz-container">
      <h1>Quiz</h1>

      <div id="start-screen">
        <input type="text" id="username" placeholder="Skriv navnet ditt" />
        <button onclick="startQuiz()">Start quiz</button>
      </div>

      <div id="quiz-box" class="hidden">
        <h2 id="question"></h2>
        <div id="answers"></div>
        <p id="feedback"></p>
        <button id="nextBtn" onclick="nextQuestion()">Neste</button>
      </div>

      <div id="result-box" class="hidden">
        <h2>Resultat</h2>
        <p id="score"></p>
      </div>
    </div>
